body:
  text: 佛言大王譬若有人於睡夢中與諸寶媛共相執持是人覺已憶念夢中所受妙觸為實爾不王言不也佛言大王於意云何是人所夢執以為實是智者不王言不也世尊何以故夢中畢竟無有寶媛況復有彼美妙觸耶當知是人徒自疲勞都無所得佛言大王如是如是愚癡異生寡聞無智於可意觸而生愛樂心生染著造如是業身業三種語業四種意業三種造作彼業剎那遷謝是業滅已不依東方南西北方四維上下中間而住至命終時見先所作心想中現如彼睡覺憶夢中事最後識滅自業現前大王識為其主業為攀緣二種相因初識生起作業受報皆不失壞或趣地獄或墮傍生琰摩羅界及阿修羅若人若天同分種類相續不絶大王最後識滅名為死蘊最初識起名為生蘊大王彼識起時無所從來滅無所至其緣生時無所從來滅無所至彼業生時無所從來滅無所至大王無有少法從於此世得至他世何以故自性空故如是了知初識初識空自業自業空身識身識空若滅滅空若生生空輪回輪回空涅槃涅槃皆自性空無有作者亦無受者但隨世俗之所顯示非第一義作是説也大王當知諸根如幻境界如夢一切諸法皆悉空寂此名空解脫門空無空相名無相解脫門若無相者則無希求名無願解脫門若能了此三解脫門與空共行菩提先道廣大如法性究竟如虛空於此譬喻當如是知復次大王譬如有人於睡夢中持熱銅鍱以為衣服而自纏身是人覺已憶念夢中熾然銅鍱觸身苦惱為實爾不王言不也佛言大王於意云何是人所夢執為真實是智者不王言不也世尊何以故夢中畢竟無熱銅鍱況復觸身受苦惱耶當知是人徒自疲勞都無有實佛言大王如是如是愚癡寡聞凡夫異生見恐畏事心生嫌惡妄生執著造是惡業身業三種語業四種意業三種造作彼業剎那遷謝是業滅已不依東方南西北方四維上下中間而住至命終時見昔所作心生恐懼如彼睡覺念夢中事最後識滅自業現前大王識為其主業為攀緣二種相因初識生起作業受果皆不失壞或趣地獄或墮傍生琰摩羅界及阿修羅若人若天初識生已各受其報同分心品相續而轉最後識滅名為死蘊最初識起名為生蘊大王彼識起時無所從來滅無所至彼緣生時無所從來滅無所至彼業生時無所從來滅無所至大王無有少法從於此世得至他世何以故自性空故如是了知初識初識空自業自業空身識身識空若滅滅空若生生空輪回輪回空涅槃涅槃皆自性空了知業報自性非有無有作者亦無受者但唯名相分別顯示大王當知諸根如幻境界如夢一切諸法皆悉空寂此名空解脫門空無空相名無相解脫門若無相者則無希求名無願解脫門若能了知三解脫門與空共行菩提先道廣大如法界究竟如虛空於此譬喻當如是知復次大王如人夢中自見其身悉皆散壞不覺諸觸是人覺已憶念夢中身根散壞而生憂惱為實爾不王言不也佛言大王於意云何是人所夢執以為實是智者不王言不也世尊何以故夢中畢竟無有身根況復散壞當知是人徒自疲勞都無有實佛言如是如是愚癡寡聞凡夫異生自見身壞心生執著復起恐怖造是癡業身業三種語業四種意業三種造作彼業剎那遷謝是業滅已不依東方南西北方四維上下中間而住至命終時見先所作心生惶怖如彼夢覺念夢中事最後識滅自業現前大王識為其主業為攀緣二種相因初識生起作業受果皆不失壞或趣地獄或墮傍生琰摩羅界及阿修羅若人若天初識生已各受其報同分心品相續隨轉最後識滅名為死蘊最初識起名為生蘊大王初識起時無所從來滅無所至彼緣生時無所從來滅無所至其業生時無所從來滅無所至大王無有少法從於此世得至他世何以故自性空故如是了知初識初識空自業自業空身識身識空若滅滅空若生生空輪回輪回空涅槃涅槃皆自性空了知業報自性非有無有作者亦無受者但唯名相分別顯示大王當知諸根如幻境界如夢一切諸法皆悉空寂此名空解脫門空無空相名無相解脫門若無相者則無希求名無願解脫門若能了此三解脫門與空共行菩提先道廣大如法界究竟如虛空於此譬喻當如是知復次大王如人夢中見彼幻師幻作五欲種種欲樂自見其身為彼圍繞受諸快樂是人覺已憶念夢中所作事業為實爾不王言不也佛言大王於意云何彼於夢境執以為實是智者不王言不也世尊何以故夢中畢竟無彼幻師況復變現五欲等事當知是人徒自疲勞都無有實佛言大王如是如是愚癡寡聞凡夫異生意著於法心生貪染復起追求轉增癡愛為彼所牽造如是罪身業三種語業四種意業三種造作彼業剎那遷謝彼業滅已不依東方南西北方四維上下中間而住至命終時見昔所作心想中現自分業報皆悉現前猶如夢覺念夢中事大王識為其主業為攀緣二種相因初識生起作業受報皆不失壞或趣地獄或墮傍生琰摩羅界及阿修羅若人若天初識生已各受其報同分心品相續隨轉最後識滅名為死蘊最初識起名為生蘊大王身識生時無所從來滅無所至彼緣生時無所從來滅無所至彼業生時無所從來滅無所至大王無有少法從於此世得至他世何以故自性空故如是了知初識初識空自業自業空身識身識空若滅滅空若生生空輪回輪回空涅槃涅槃皆自性空作業不可得受報不可得但唯名相分別顯示大王當知諸根如幻境界如夢一切諸法皆悉空寂此名空解脫門空無空相名無相解脫門若無相者則無希求名無願解脫門依此了知三解脫門與空共行菩提先道廣大如法界究竟如虛空於此譬喻當如是知復次大王譬如有人於睡夢中為彼瀑流漂沒己身及其眷屬受諸惶怖種種苦惱是人覺已憶念夢中水所漂溺為實爾不王言不也佛言大王是人所夢執以為實是智者不王言不也世尊何以故夢中畢竟無水所漂況復有彼惶怖苦惱當知是人徒自疲勞都無有實佛言大王如是如是愚癡寡聞凡夫異生意著諸法生憂惱處展轉尋求無對治道以不了故起諸惡行身業三種語業四種意業三種造作彼業剎那遷謝是業滅已不依東方南西北方四維上下中間而住至命終時心生惶怖見昔所作悉現其前如人夢覺念夢中事大王識為其主業為攀緣二種相因初識生起作業受果皆不失壞或趣地獄或墮傍生琰摩羅界及阿修羅若人若天初識生已各受其報同分心品相續不絶最後識滅名為死蘊最初識起名為生蘊大王初識生時無所從來滅無所至彼緣生時無所從來滅無所至彼業生時無所從來滅無所至大王無有少法從於此世得至他世何以故自性空故如是了知初識初識空自業自業空身識身識空若滅滅空若生生空輪回輪回空涅槃涅槃皆自性空無有作者亦無受者但唯名相分別顯示大王諸根如幻境界如夢一切諸法皆悉空寂此名空解脫門空無空相名無相解脫門若無相者則無希求名無願解脫門若能了此三解脫門與空共行菩提先道廣大如法界究竟如虛空於此譬喻當如是知復次大王譬如有人於睡夢中自見其身飲酒惛醉不識善法及諸惡行功德過失都不覺知是人覺已念夢中事為實爾不王言不也佛言大王於意云何是人所夢執為真實是智者不王言不也世尊何以故夢中畢竟無飲酒者況惛醉耶當知是人徒自疲勞都無有實佛言大王如是如是愚癡寡聞凡夫異生意著諸法起愛染心造是癡業身業三種語業四種意業三種造作彼業剎那遷謝是業滅已不依東方南西北方四維上下中間而住至命終時見先所作自分業報心想中現如人夢覺念夢中事大王識為其主業為攀緣二種相因初識生起作業受報皆不失壞或趣地獄或墮傍生琰摩羅界及阿修羅若人若天各受其報同類心品相續隨轉最後識滅名為死蘊最初識起名為生蘊大王身識生時無所從來滅無所至彼緣生時無所從來滅無所至彼業生時無所從來滅無所至大王無有少法從於此世得至他世何以故自性空故如是了知初識初識空自業自業空身識身識空若滅滅空若生生空輪回輪回空涅槃涅槃皆自性空無有作者亦無受者若業若報皆不可得但唯名相分別顯示大王諸根如幻境界如夢一切諸法自性空寂此名空解脫門空無空相名無相解脫門若無相者則無希求名無願解脫門若能了知三解脫門與空共行菩提先道廣大如法界究竟如虛空於此譬喻當如是知
